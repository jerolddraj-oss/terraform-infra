name: Terraform Azure Deployment

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ./terraform-infra/env/dev   # ✅ IMPORTANT FIX

    steps:
    # Checkout repo
    - name: Checkout
      uses: actions/checkout@v4

    # Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # Azure Login (REQUIRED)
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Debug (VERY IMPORTANT - keep this for now)
    - name: Debug Files
      run: |
        echo "Current path:"
        pwd
        echo "Repo structure:"
        ls -R

    # Terraform Init
    - name: Terraform Init
      run: terraform init

    # Terraform Format
    - name: Terraform Format
      run: terraform fmt -check

    # Terraform Validate
    - name: Terraform Validate
      run: terraform validate

    # Terraform Plan
    - name: Terraform Plan
      run: terraform plan -input=false

    # Terraform Apply (FIXED condition)
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false
